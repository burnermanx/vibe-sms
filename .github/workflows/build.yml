name: Build

on:
  push:
    branches: [ "main" ]
  release:
    types: [created]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.os }} — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write   # needed to upload binaries to GitHub Releases
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: vibe-sms
            asset_name: vibe-sms-linux-x86_64

          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: vibe-sms.exe
            asset_name: vibe-sms-windows-x86_64.exe
            zip_name: vibe-sms-windows-x86_64.zip

          # macOS Intel
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: vibe-sms
            asset_name: vibe-sms-macos-x86_64
            zip_name: vibe-sms-macos-x86_64.zip

          # macOS Apple Silicon
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: vibe-sms
            asset_name: vibe-sms-macos-arm64
            zip_name: vibe-sms-macos-arm64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Strip leading 'v' from the tag (v0.2.0 → 0.2.0), patch Cargo.toml so
      # that env!("CARGO_PKG_VERSION") and the macOS bundle version are correct.
      - name: Set version from release tag
        if: github.event_name == 'release'
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          sed -i.bak 's/^version = "[^"]*"/version = "'"$VERSION"'"/' Cargo.toml
          rm -f Cargo.toml.bak
          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Cargo.toml version set to $VERSION"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Linux system deps:
      #   winit (x11/wayland), glutin (EGL/GLX), glow (OpenGL), cpal (ALSA),
      #   rfd + gtk + muda (GTK3 + libxdo), gilrs (udev)
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxkbcommon-dev \
            libgl1-mesa-dev \
            libgtk-3-dev \
            libxdo-dev \
            libwayland-dev \
            libudev-dev \
            imagemagick \
            pkg-config

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build (release)
        run: cargo build --release --target ${{ matrix.target }}

      - name: Run tests
        # Skip cross-compiled macOS arm64 on Intel runner
        if: matrix.target != 'aarch64-apple-darwin'
        run: cargo test --target ${{ matrix.target }}

      # ── Package as zip (Windows / macOS only) ────────────────────────────
      - name: Package as zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" `
            -DestinationPath "${{ matrix.zip_name }}"

      - name: Package as zip (macOS)
        if: runner.os == 'macOS'
        run: |
          APP_NAME="vibe-sms.app"
          mkdir -p "$APP_NAME/Contents/MacOS"
          mkdir -p "$APP_NAME/Contents/Resources"
          cp "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" "$APP_NAME/Contents/MacOS/"
          cp "assets/icon.icns" "$APP_NAME/Contents/Resources/AppIcon.icns"
          cat > "$APP_NAME/Contents/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>vibe-sms</string>
              <key>CFBundleIconFile</key>
              <string>AppIcon</string>
              <key>CFBundleIdentifier</key>
              <string>com.burnermanx.vibesms</string>
              <key>CFBundleName</key>
              <string>vibe-sms</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>${RELEASE_VERSION:-0.1.0}</string>
              <key>LSMinimumSystemVersion</key>
              <string>10.13.0</string>
          </dict>
          </plist>
          EOF
          zip -qr "${{ matrix.zip_name }}" "$APP_NAME"

      # Upload binary artifact — Linux: raw binary, Windows/macOS: zip
      - name: Upload build artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

      - name: Upload build artifact (Windows / macOS)
        if: runner.os != 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.zip_name }}
          path: ${{ matrix.zip_name }}

      # ── AppImage (Linux x86_64 only) ─────────────────────────────────────
      - name: Create AppImage
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          # ── AppDir structure ──────────────────────────────────────────────
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          cp target/x86_64-unknown-linux-gnu/release/vibe-sms AppDir/usr/bin/vibe-sms

          # ── Desktop entry ─────────────────────────────────────────────────
          cat > AppDir/vibe-sms.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=vibe-sms
          Exec=vibe-sms %f
          Icon=vibe-sms
          Comment=Sega Master System / Game Gear emulator
          Categories=Game;Emulator;
          MimeType=application/x-sms-rom;application/x-gg-rom;
          EOF
          cp AppDir/vibe-sms.desktop AppDir/usr/share/applications/

          # ── Icon ──────────────────────────────────────────────────────────
          cp assets/icon.png AppDir/usr/share/icons/hicolor/256x256/apps/vibe-sms.png
          cp assets/icon.png AppDir/vibe-sms.png

          # ── AppRun script ─────────────────────────────────────────────────
          cat > AppDir/AppRun << 'EOF'
          #!/bin/sh
          DIR="$(dirname "$(readlink -f "$0")")"
          exec "$DIR/usr/bin/vibe-sms" "$@"
          EOF
          chmod +x AppDir/AppRun

          # ── Package with appimagetool ─────────────────────────────────────
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool-x86_64.AppImage
          ARCH=x86_64 ./appimagetool-x86_64.AppImage --appimage-extract-and-run \
            AppDir vibe-sms-linux-x86_64.AppImage

      - name: Upload AppImage artifact
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        uses: actions/upload-artifact@v4
        with:
          name: vibe-sms-linux-x86_64.AppImage
          path: vibe-sms-linux-x86_64.AppImage

      # ── On release, upload everything ────────────────────────────────────
      - name: Upload binary to release (Linux)
        if: github.event_name == 'release' && runner.os == 'Linux'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
          asset_name: ${{ matrix.asset_name }}
          tag: ${{ github.ref }}

      - name: Upload zip to release (Windows / macOS)
        if: github.event_name == 'release' && runner.os != 'Linux'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ matrix.zip_name }}
          asset_name: ${{ matrix.zip_name }}
          tag: ${{ github.ref }}

      - name: Upload AppImage to release
        if: github.event_name == 'release' && matrix.target == 'x86_64-unknown-linux-gnu'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: vibe-sms-linux-x86_64.AppImage
          asset_name: vibe-sms-linux-x86_64.AppImage
          tag: ${{ github.ref }}
